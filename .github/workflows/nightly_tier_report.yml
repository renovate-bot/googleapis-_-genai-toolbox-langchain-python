name: Weekly SDK Tier Assessment

on:
  schedule:
    - cron: '0 6 * * 0'  # Runs at 6 AM every Sunday
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  tier-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.13"

      - name: Install test requirements
        working-directory: ./packages/toolbox-core
        run: pip install -e .[test]

      - name: Install library requirements
        working-directory: ./packages/toolbox-core
        run: pip install -r requirements.txt

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22"

      - name: Run SDK Tier Assessment
        id: assessment
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npx --yes @modelcontextprotocol/conformance@latest tier-check --repo ${{ github.repository }} --output markdown --client-cmd "python packages/toolbox-core/tests/conformance/client.py" > tier_report.txt
        continue-on-error: true

      - name: Report Tier Status
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('tier_report.txt', 'utf8');
            const title = '[Dashboard: Conformance] Weekly SDK Tier Assessment Failure';
            
            const prevIssues = await github.rest.issues.listForRepo({
              ...context.repo,
              state: 'open'
            });
            
            // Find any open issue matching the exact dashboard title
            let existingIssue = prevIssues.data.find(issue => issue.title === title);
            
            if (report.includes('Tier Assessment: Tier 1')) {
              console.log('Tier 1 achieved! Closing open issue if it exists.');
              if (existingIssue) {
                await github.rest.issues.createComment({
                  ...context.repo,
                  issue_number: existingIssue.number,
                  body: "The weekly SDK Tier Assessment confirms we are now **Tier 1**! Closing this issue."
                });
                await github.rest.issues.update({
                  ...context.repo,
                  issue_number: existingIssue.number,
                  state: 'closed'
                });
              }
              return;
            }
            
            const body = `The weekly SDK Tier Assessment found gaps preventing Tier 1 status:\n\n${report}\n\nPlease fix these operational gaps.`;
            
            if (existingIssue) {
              console.log(`Found previous issue ${existingIssue.html_url}, updating body`);
              await github.rest.issues.update({
                ...context.repo,
                issue_number: existingIssue.number,
                body: body
              });
            } else {
              console.log('No previous issue found, creating one');
              await github.rest.issues.create({
                ...context.repo,
                title: title,
                body: body
              });
            }
